<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game 2: Word Hunt – Unit 20</title>
  <meta name="description" content="Word Hunt: Match vocabulary words to definitions and collocations from Unit 20." />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f1a;
      --surface: #151829;
      --card: #1c2038;
      --border: rgba(255,255,255,0.07);
      --accent: #fc5c7d;
      --accent2: #6a82fb;
      --text: #e8eaf6;
      --muted: #7b80a8;
      --success: #22c55e;
      --error: #ef4444;
      --warn: #f59e0b;
      --radius: 16px;
    }
    body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 28px; border-bottom: 1px solid var(--border); background: var(--surface);
      position: sticky; top: 0; z-index: 100;
    }
    .nav-left { display: flex; align-items: center; gap: 14px; }
    .back-btn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      border-radius: 10px; padding: 8px 16px; font-family: inherit; font-size: 0.85rem;
      cursor: pointer; text-decoration: none; display: flex; align-items: center; gap: 6px; transition: all 0.2s;
    }
    .back-btn:hover { border-color: var(--accent); color: var(--accent); }
    .game-title-nav { font-size: 1rem; font-weight: 700; }
    .game-title-nav span { color: var(--accent); }

    .stats-bar { display: flex; align-items: center; gap: 28px; flex-wrap: wrap; }
    .stat { display: flex; flex-direction: column; align-items: flex-end; }
    .stat-label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .stat-value { font-size: 1.15rem; font-weight: 700; }

    main { max-width: 1050px; margin: 0 auto; padding: 36px 24px 60px; }

    /* Intro */
    .intro { text-align: center; margin-bottom: 36px; }
    .intro h2 { font-size: 1.4rem; font-weight: 700; margin-bottom: 8px; }
    .intro p { color: var(--muted); font-size: 0.9rem; }

    /* Round indicator */
    .round-info { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .round-badge {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; padding: 6px 18px; border-radius: 100px;
      font-size: 0.78rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    }
    .timer-badge {
      background: var(--card); border: 1px solid var(--border);
      padding: 6px 18px; border-radius: 100px;
      font-size: 0.92rem; font-weight: 700; font-variant-numeric: tabular-nums;
      color: var(--warn); transition: color 0.3s;
    }
    .timer-badge.danger { color: var(--error); animation: pulse 0.5s infinite alternate; }
    @keyframes pulse { to { opacity: 0.6; } }

    /* Game board */
    .board { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    @media (max-width: 650px) { .board { grid-template-columns: 1fr; } }

    .column-header {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 14px; padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    /* Word chips */
    .words-column { display: flex; flex-direction: column; gap: 10px; }
    .word-chip {
      background: var(--card); border: 2px solid var(--border);
      border-radius: 12px; padding: 14px 18px;
      font-size: 1rem; font-weight: 700; color: var(--text);
      cursor: grab; user-select: none; transition: all 0.2s;
      display: flex; align-items: center; gap: 10px; position: relative;
    }
    .word-chip:hover:not(.matched):not(.dragging) { border-color: var(--accent); transform: translateX(4px); }
    .word-chip.dragging { opacity: 0.4; cursor: grabbing; }
    .word-chip.matched { border-color: var(--success); background: rgba(34,197,94,0.1); color: var(--success); cursor: default; opacity: 0.7; }
    .word-chip.wrong-flash { border-color: var(--error); background: rgba(239,68,68,0.1); animation: shake 0.4s; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%,60% { transform: translateX(-6px); }
      40%,80% { transform: translateX(6px); }
    }
    .chip-icon { font-size: 0.8rem; opacity: 0.5; }

    /* Definition targets */
    .defs-column { display: flex; flex-direction: column; gap: 10px; }
    .def-target {
      background: rgba(255,255,255,0.03); border: 2px dashed var(--border);
      border-radius: 12px; padding: 14px 18px; min-height: 68px;
      font-size: 0.88rem; color: var(--muted); line-height: 1.5;
      transition: all 0.2s; position: relative;
      display: flex; align-items: center; gap: 10px;
    }
    .def-target.drag-over { border-color: var(--accent); background: rgba(252,92,125,0.07); }
    .def-target.matched { border-color: var(--success); border-style: solid; background: rgba(34,197,94,0.07); color: var(--text); }
    .def-target .match-word {
      font-weight: 700; color: var(--success); font-size: 0.9rem;
      padding: 3px 10px; background: rgba(34,197,94,0.1); border-radius: 8px;
      white-space: nowrap; flex-shrink: 0;
    }
    .def-text { flex: 1; }
    .colloc-tag {
      position: absolute; top: -10px; right: 12px;
      background: var(--surface); border: 1px solid var(--border);
      padding: 2px 10px; border-radius: 100px;
      font-size: 0.65rem; color: var(--accent2); font-weight: 600; letter-spacing: 1px;
    }

    /* Feedback */
    .feedback-toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--card); border: 1px solid var(--border);
      border-radius: 100px; padding: 12px 28px;
      font-size: 0.9rem; font-weight: 600;
      transition: transform 0.4s cubic-bezier(.34,1.56,.64,1), opacity 0.4s;
      opacity: 0; z-index: 200; white-space: nowrap;
    }
    .feedback-toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .feedback-toast.success-toast { border-color: rgba(34,197,94,0.4); color: var(--success); }
    .feedback-toast.fail-toast { border-color: rgba(239,68,68,0.4); color: var(--error); }

    /* Score screen */
    .score-screen { display: none; text-align: center; padding: 60px 20px; }
    .score-screen.show { display: block; animation: popIn 0.5s; }
    @keyframes popIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .score-big { font-size: 5rem; font-weight: 900; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .score-subtitle { font-size: 1.1rem; color: var(--muted); margin: 10px 0 30px; }
    .score-details { display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; margin-bottom: 40px; }
    .score-detail { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .score-detail-val { font-size: 1.8rem; font-weight: 700; }
    .score-detail-label { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .result-actions { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    .result-btn {
      padding: 14px 28px; border-radius: 100px; font-family: inherit; font-size: 0.95rem;
      font-weight: 700; cursor: pointer; border: none; transition: transform 0.2s;
    }
    .result-btn:hover { transform: scale(1.04); }
    .result-btn.primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }
    .result-btn.secondary { background: var(--card); color: var(--muted); border: 1px solid var(--border); }
  </style>
</head>
<body>

<nav>
  <div class="nav-left">
    <a href="index.html" class="back-btn">← Back</a>
    <div class="game-title-nav">🔍 <span>Word Hunt</span></div>
  </div>
  <div class="stats-bar">
    <div class="stat">
      <span class="stat-label">Score</span>
      <span class="stat-value" id="scoreDisplay" style="color:var(--accent)">0</span>
    </div>
    <div class="stat">
      <span class="stat-label">Matched</span>
      <span class="stat-value" id="matchedDisplay" style="color:var(--success)">0 / 0</span>
    </div>
  </div>
</nav>

<main>
  <div class="intro">
    <h2>🔍 Word Hunt</h2>
    <p>Drag each word on the left and drop it onto its correct definition on the right. Beat the clock!</p>
  </div>

  <div id="gameArea">
    <div class="round-info">
      <div class="round-badge" id="roundBadge">Round 1 of 4</div>
      <div class="timer-badge" id="timerBadge">⏱ 60s</div>
    </div>

    <div class="board">
      <div>
        <div class="column-header">📌 Words — Drag these →</div>
        <div class="words-column" id="wordsColumn"></div>
      </div>
      <div>
        <div class="column-header">📖 Definitions — Drop here →</div>
        <div class="defs-column" id="defsColumn"></div>
      </div>
    </div>
  </div>

  <div class="score-screen" id="scoreScreen">
    <div style="font-size:4rem">🏆</div>
    <div class="score-big" id="finalScore">0</div>
    <div class="score-subtitle">Total Score</div>
    <div class="score-details">
      <div class="score-detail">
        <div class="score-detail-val" id="finalMatched" style="color:var(--success)">0</div>
        <div class="score-detail-label">Correct Matches</div>
      </div>
      <div class="score-detail">
        <div class="score-detail-val" id="finalTime" style="color:var(--warn)">0s</div>
        <div class="score-detail-label">Time Used</div>
      </div>
    </div>
    <div class="result-actions">
      <button class="result-btn primary" onclick="restartGame()">🔄 Play Again</button>
      <button class="result-btn secondary" onclick="location.href='index.html'">🏠 Home</button>
    </div>
  </div>
</main>

<div class="feedback-toast" id="feedbackToast"></div>

<script>
const ALL_DATA = [
  { word: "rampage", def: "A period of wild, violent behavior or rushing about in anger", colloc: "go on a rampage" },
  { word: "trigger", def: "To cause an event or action to begin; to set off", colloc: "trigger a reaction" },
  { word: "prevalence", def: "How widespread or common something is in society", colloc: "widespread prevalence" },
  { word: "culprit", def: "A person or thing responsible for causing a problem or crime", colloc: "identify the culprit" },
  { word: "dispose of", def: "To get rid of something, especially in a safe or proper way", colloc: "dispose of weapons" },
  { word: "influence", def: "The power to have an effect on people or situations", colloc: "unhealthy influence" },
  { word: "convinced", def: "Completely certain that something is true or will happen", colloc: "not everyone is convinced" },
  { word: "realistic", def: "Representing things as they really are; lifelike", colloc: "more realistic graphics" },
  { word: "blur", def: "To make the difference between two things less clear or distinct", colloc: "blur the line between" },
  { word: "distinguish", def: "To recognize or understand the difference between two things", colloc: "distinguish between reality and fiction" },
  { word: "decline", def: "To become smaller, fewer, or less; to decrease over time", colloc: "crimes have declined" },
  { word: "quadruple", def: "To increase to four times the original amount or number", colloc: "sales have quadrupled" },
  { word: "anti-social", def: "Behaving in a way that is harmful or disruptive to society", colloc: "anti-social behavior" },
  { word: "predisposition", def: "A natural tendency to behave in a certain way or develop a condition", colloc: "a predisposition to violence" },
  { word: "distract", def: "To take someone's attention away from what they are doing", colloc: "distract attention from" },
  { word: "penalize", def: "To punish someone or put them at a disadvantage for something", colloc: "penalized for + reason" },
  { word: "demonize", def: "To portray or describe someone or something as evil or dangerous", colloc: "demonize firearms" },
  { word: "ineffective", def: "Not producing the desired results; failing to work as intended", colloc: "ban would be ineffective" },
  { word: "perceive", def: "To become aware of, understand, or interpret something", colloc: "perceive as a threat" },
  { word: "fictional", def: "Relating to fiction; not real; imaginary or invented", colloc: "fictional universe" }
];

// Split into rounds of 5
const ROUNDS = [];
for (let i = 0; i < ALL_DATA.length; i += 5) {
  ROUNDS.push(ALL_DATA.slice(i, i + 5));
}

let currentRound = 0, totalScore = 0, totalMatched = 0, totalTimeUsed = 0;
let matched = 0, timeLeft = 60, timer = null, roundStart;
let dragging = null;

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function loadRound() {
  matched = 0;
  const round = ROUNDS[currentRound];
  const shuffledWords = shuffle([...round]);
  const shuffledDefs = shuffle([...round]);

  document.getElementById('roundBadge').textContent = `Round ${currentRound + 1} of ${ROUNDS.length}`;
  document.getElementById('matchedDisplay').textContent = `${totalMatched} / 20`;

  // Words column
  const wCol = document.getElementById('wordsColumn');
  wCol.innerHTML = '';
  shuffledWords.forEach(item => {
    const chip = document.createElement('div');
    chip.className = 'word-chip';
    chip.id = `chip-${item.word.replace(/\s/g,'_')}`;
    chip.draggable = true;
    chip.dataset.word = item.word;
    chip.innerHTML = `<span class="chip-icon">⋮⋮</span><span>${item.word}</span>`;
    chip.addEventListener('dragstart', onDragStart);
    chip.addEventListener('dragend', onDragEnd);
    wCol.appendChild(chip);
  });

  // Defs column
  const dCol = document.getElementById('defsColumn');
  dCol.innerHTML = '';
  shuffledDefs.forEach(item => {
    const target = document.createElement('div');
    target.className = 'def-target';
    target.dataset.answer = item.word;
    target.innerHTML = `
      <span class="colloc-tag">${item.colloc}</span>
      <span class="def-text">${item.def}</span>
    `;
    target.addEventListener('dragover', onDragOver);
    target.addEventListener('dragleave', onDragLeave);
    target.addEventListener('drop', onDrop);
    dCol.appendChild(target);
  });

  startTimer();
  roundStart = Date.now();
}

function startTimer() {
  clearInterval(timer);
  timeLeft = 60;
  updateTimer();
  timer = setInterval(() => {
    timeLeft--;
    updateTimer();
    if (timeLeft <= 0) { clearInterval(timer); endRound(true); }
  }, 1000);
}

function updateTimer() {
  const el = document.getElementById('timerBadge');
  el.textContent = `⏱ ${timeLeft}s`;
  el.className = timeLeft <= 10 ? 'timer-badge danger' : 'timer-badge';
}

function onDragStart(e) {
  dragging = e.currentTarget;
  dragging.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', dragging.dataset.word);
}
function onDragEnd(e) {
  if (dragging) dragging.classList.remove('dragging');
  dragging = null;
}
function onDragOver(e) {
  e.preventDefault();
  if (!e.currentTarget.classList.contains('matched')) {
    e.currentTarget.classList.add('drag-over');
  }
}
function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function onDrop(e) {
  e.preventDefault();
  const target = e.currentTarget;
  target.classList.remove('drag-over');
  if (target.classList.contains('matched')) return;

  const word = e.dataTransfer.getData('text/plain');
  const answer = target.dataset.answer;

  if (word === answer) {
    // Correct!
    matched++;
    totalMatched++;
    const points = Math.max(10, timeLeft * 2);
    totalScore += points;
    document.getElementById('scoreDisplay').textContent = totalScore;
    document.getElementById('matchedDisplay').textContent = `${totalMatched} / 20`;

    target.classList.add('matched');
    const defText = target.querySelector('.def-text').textContent;
    target.innerHTML = `<span class="match-word">✓ ${word}</span><span class="def-text">${defText}</span>`;

    const chip = document.getElementById(`chip-${word.replace(/\s/g,'_')}`);
    if (chip) chip.classList.add('matched');

    showToast(`✅ "${word}" — Correct! +${points}pts`, 'success-toast');

    if (matched === ROUNDS[currentRound].length) {
      clearInterval(timer);
      setTimeout(() => endRound(false), 700);
    }
  } else {
    // Wrong — flash chip
    const chip = document.getElementById(`chip-${word.replace(/\s/g,'_')}`);
    if (chip) {
      chip.classList.add('wrong-flash');
      setTimeout(() => chip.classList.remove('wrong-flash'), 400);
    }
    showToast(`❌ Not quite — try again!`, 'fail-toast');
  }
}

function endRound(timedOut) {
  clearInterval(timer);
  totalTimeUsed += (60 - timeLeft);
  currentRound++;
  if (currentRound >= ROUNDS.length) {
    showResults();
  } else {
    showToast(timedOut ? `⏱ Time's up! Next round →` : `🎉 Round complete! Next round →`, 'success-toast');
    setTimeout(loadRound, 1200);
  }
}

function showResults() {
  document.getElementById('gameArea').style.display = 'none';
  const ss = document.getElementById('scoreScreen');
  ss.className = 'score-screen show';
  document.getElementById('finalScore').textContent = totalScore;
  document.getElementById('finalMatched').textContent = totalMatched;
  document.getElementById('finalTime').textContent = totalTimeUsed + 's';
}

function restartGame() {
  currentRound = 0; totalScore = 0; totalMatched = 0; totalTimeUsed = 0;
  document.getElementById('gameArea').style.display = 'block';
  document.getElementById('scoreScreen').className = 'score-screen';
  loadRound();
}

let toastTimeout;
function showToast(msg, cls) {
  const t = document.getElementById('feedbackToast');
  t.textContent = msg;
  t.className = `feedback-toast ${cls} show`;
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => { t.className = 'feedback-toast'; }, 2200);
}

loadRound();
</script>
</body>
</html>
